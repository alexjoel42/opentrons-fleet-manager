name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Alex_Observability/Observability_V0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Inject version into agent pyproject.toml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" agent/pyproject.toml

      - name: Build Python agent
        run: uv build agent/
        working-directory: Alex_Observability/Observability_V0

      - name: Zip frontend dist
        run: |
          cd dist && zip -r ../observability-v0-frontend-${{ github.ref_name }}.zip . && cd ..
        working-directory: Alex_Observability/Observability_V0

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            Alex_Observability/Observability_V0/observability-v0-frontend-${{ github.ref_name }}.zip
            Alex_Observability/Observability_V0/agent/dist/*.whl
            Alex_Observability/Observability_V0/agent/dist/*.tar.gz

  publish-pypi:
    name: Publish agent to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: Alex_Observability/Observability_V0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Inject version into agent pyproject.toml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" agent/pyproject.toml

      - name: Build Python agent
        run: uv build agent/
        working-directory: Alex_Observability/Observability_V0

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: Alex_Observability/Observability_V0/agent/dist
