name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Alex_Observability/Observability_V0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Alex_Observability/Observability_V0/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Zip frontend dist
        run: |
          cd dist && zip -r ../observability-v0-frontend-${{ github.ref_name }}.zip . && cd ..
        working-directory: Alex_Observability/Observability_V0

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            Alex_Observability/Observability_V0/observability-v0-frontend-${{ github.ref_name }}.zip
